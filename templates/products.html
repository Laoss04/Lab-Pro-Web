{% extends "base.html" %}

{% block content %}

    <table>

        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
        </tr>

        {% for p in product_list %}

            <tr>
                <td>{{ p.ID }}</td>
                <td>{{ p.Name }}</td>
                <td>{{ p.Price }}</td>
            </tr>

        {% endfor %}

    </table>

{% endblock %}
